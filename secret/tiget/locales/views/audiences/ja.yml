ja:
  views:
    audiences:
      index:
        title: "予約者一覧(過去10日)"
        table:
          head:
            reservation_date: "予約日"
            event: "イベント"
            name: "名前"
            mail: "メール"
            count: "枚数"
            confirm: "確認"
          body:
            unknown: "イベント不明"
            done: "済"
            not_yet: "未"
      new:
        caution:
          title: "必ず下記をご確認ください"
          body_list:
            first: "フォームに入力した情報は全て主催者に通知されます。"
            second: "ご予約の確定については、「予約する」ボタンを押下後に自動送信される「イベントの予約確認メール」にあるリンク先ページを表示することで「予約確定」となりますのでご了承ください。"
            third: "ご予約の確定は、イベントの予約確認メール受信後3時間以内にお願いします。３時間を過ぎると予約の確定は出来なくなります。"
            fourth: "ご予約後に自動返信メールが届かない場合は以下をご確認ください。"
            fifth: "PCメール拒否設定されている場合があります。ドメイン指定受信設定で「tiget.net」をドメイン指定受信に設定願います。"
            sixth: "返信メールが迷惑メールフォルダに振り分けられてしまう場合がございます。お手数ですが、迷惑メールフォルダのご確認をお願い致します。"
            seventh: "上記設定に問題がないにもかかわらず、「イベントの予約確認メール」を受信出来ない場合は、大変お手数ですが、違うメールアドレスで再度ご予約ください。"
            eighth: "予約確定までは主催者側に予約メールは送信されません。"
            ninth: "当日キャンセル等で定数に満たない場合は、当日券の販売をする場合があります。"
            tenth: "イベントの実施や予約及び購入等に関して万が一トラブルが生じた際には、主催者と予約者または購入者との間で解決することとします。"
      edit:
        title: "Editing audience"
      create:
        title: "メール確認"
        body:
          not_yet: "まだご予約のお手続きは完了しておりません。"
          sent: "お客様のメールアドレスに確認用メールをお送りしました。"
          delay: "メールが届くまで10分程度時間がかかる場合がございます。"
          to_be_confirmed: "届いたメールのリンクをクリックすることで、予約が確定します。"
          check: "大変お手数ですが、メールをご確認ください。"
      confirm:
        title: "予約完了"
        confirmed:
          head: "ご予約が確定しました。"
          honorific: "様"
          body_html: "<span class=\"title\">『%{title}』</span>のチケット<span class=\"vol\">%{volume}</span>枚を、受付番号<span class=\"num\">%{num}</span>番で承りました。"
          show: "チケットを表示する"
          link: "このURLを再度開くとチケットを表示できます。"
        undelivered:
          head: "予約確定メールが届いていない場合"
          body:
            confirm: "予約確定メールのみ迷惑メールに分類されることがあります。お手数ですがご確認ください。"
            contact: "予約確定メールが届いていない場合はお手数ですが"
            to_event:
              after: "のページへ"
      confirmed:
        title: "このチケットのご予約は確定しています"
        receipt_no: 受付番号 %{num}番
        show: "チケットを表示する"
        cancel:
          caption: "キャンセルについて"
          to_cancel_html: チケットのキャンセルについては%{link}をご確認ください。
      cancel_info:
        caption : "キャンセル方法について"
      before_confirm:
        title: "まだご予約のお手続きは完了しておりません。"
        body:
          not_yet: "完了まであと少しです。"
          sent: "お客様のメールアドレスに確認用メールをお送りしました。"
          delay: "メールが届くまで10分程度時間がかかる場合がございます。"
          to_be_confirmed: "届いたメールのリンクをクリックすることで、予約が確定します。"
          check: "大変お手数ですが、メールをご確認ください。"
      cancel:
        title: "チケットのキャンセル"
        expired:
          caption: "このチケットはキャンセル期間が終了しています。"
          contact: "キャンセルについてはイベント主催者さまへお問い合わせください。"
        not_allowed:
          caption: "このチケットは申込者さまによるキャンセルが許可されていません。"
          contact: "キャンセルについてはイベント主催者さまへお問い合わせください。"
        allowed:
          caption: このチケットは%{date}までキャンセルできます。
          notice: "一度キャンセルすると、もとに戻せませんのでご注意ください。"
          caution: "複数枚予約している場合、すべてキャンセルとなります。"
          contact: "一部をキャンセルしたい場合はイベント主催者さまへお問い合わせください。"
          ticket:
            caption: "予約情報"
            event: イベント
            place: "会場"
            event_date: "開催日"
            open_date: "開場"
            play_date: "開演"
            price: "料金"
            count: "枚数"
            receipt_no: "受付番号"
            phone_number: "電話番号"
            address: "住所"
            name: "氏名"
            remarks: "備考"
      recaptcha_error:
        title: "おおっと、ロボットではありませんか？"
        body:
          first: "TIGET では BOT を使用したチケットの買い占め対策として"
          second: "ロボットを使ったアクセスを遮断しています。"
          third: "もし、ロボットではない場合、"
          fourth: "お手数ですがイベントページに戻って再度お試しください。"
