              message: "メールアドレスが不正です。全角や使用できない記号等が含まれていないかご確認ください。"
        seat_information:
          target_name: "座席情報:"
          errors:
            exceed_maximum_seat:
              message: "チケットの枚数以上は設定できません"
      event_photo_validator:
        title:
          target_name: "タイトル"
          errors:
            invalid_value:
            #{used_invalid_chars.join('、')}
              message: "使用できない文字が含まれています： %{chars}"
            invalid_leading_dot:
              message: "先頭に「.」は使用できません"
            invalid_trailing_dot:
              message: "末尾に「.」は使用できません"
            invalid_consecutiveDot:
              message: "「.」は連続して使用できません"
