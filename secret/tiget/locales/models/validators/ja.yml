ja:
  models:
    validators:
      audience_validator:
        base:
          errors:
            unable_subscription_purchase:
              message: "短時間での連続予約/購入はできません。しばらく時間をおいてからお試しください。"
            limited_area:
            # Go Toイベント
              message: "%{target_event}対象イベントへの申込が制限されている地域です。"
            exceed_maximum_accepted_seats:
              message: "受付枚数を越えています。"
            invalid_value:
              message: "枚数が不正です。"
        convenience_store_payment:
          target_name: "コンビニ決済："
          errors:
            invalid_exclusion:
              message: "コンビニ決済はリセールの対象外です。"
            unable_payment:
              message: "リセール購入ではコンビニ決済を選択できません。"
        refund_fee:
          target_name: "返金手数料購入者負担:"
          errors:
            limited_action:
            # 払い戻し時
              message: "%{target_event}のみ設定ができます"
            unable_set:
            # Go Toイベント
              message: "%{target_event}では設定できません"
        quantity:
          target_name: "枚数:"
          errors:
            exceed_limit:
              message: "ご指定のプログラムは定員に達したため受付できません。"
            not_enough_seats:
            # disp_num.to_s
              message: "残り%{disp_num}'枚になりました。再度枚数を指定してください。"
            exceed_maximum_seats:
            # max_seats.to_s
              message: "このイベントは最大%{max_seats}枚までしか指定できません。再度枚数を指定してください。"
            exceed_total_quantity_seats:
              message: "枚数を増やすことはできません。再度枚数を指定してください。"
        email:
          target_name: "メールアドレス:"
          errors:
            invalid_whitespace:
              message: "メールアドレスに空白が含まれています。スマートフォンの場合末尾に自動で空白が入力される場合がございます。ご確認ください。"
