upstream unicorn {
    server unix:/var/www/iicom-sub/tmp/sockets/.unicorn.sock;
}

server {
    listen 80;
    server_name iicom-dl.jp 153.120.42.91;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name iicom-dl.jp 153.120.42.91 ;

    client_max_body_size 100M;
    root /var/www/iicom-sub/public;
    
    try_files   $uri/index.html $uri @unicorn;
    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';

    ssl_certificate "/home/ubuntu/.ssh/crt/iicom-dl.jp.crt";
    ssl_certificate_key "/home/ubuntu/.ssh/iicom_sub_2023_private_unencrypted.key";

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    # ssl_prefer_server_ciphers on;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_pass http://unicorn;
    }
}

