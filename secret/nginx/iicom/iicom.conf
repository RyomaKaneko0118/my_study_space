upstream iicom {
    server unix:///var/www/iicom/current/tmp/sockets/puma.socket;
}

server {
    listen 443 ssl;
    server_name 153.127.65.148;
    root /var/www/iicom/current/public;

    client_max_body_size 100M;

    ssl_verify_client optional;

    add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';

    ssl_protocols TLSv1.2;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
#        if ($ssl_client_verify != SUCCESS) {
#            return 403;
#        }

        proxy_pass http://iicom;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto "https";
        proxy_redirect off;
    }

    location /consultants {
 #       if ($ssl_client_verify != SUCCESS) {
 #           return 403;
 #       }

        # consultant only
 #       if ($ssl_client_serial !~* ^(928611D30CD4789A|928611D30CD4789F|928611D30CD478A1)$){
 #           return 403;
 #       }

        proxy_pass http://iicom/consultants;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto "https";
        proxy_redirect off;
    }

    location /admin {
 #       if ($ssl_client_verify != SUCCESS) {
 #           return 403;
 #       }

        # consultant only
 #       if ($ssl_client_serial !~* ^(928611D30CD4789A|928611D30CD4789F|928611D30CD478A1)$){
 #           return 403;
 #       }

        proxy_pass http://iicom/admin;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto "https";
        proxy_redirect off;
    }

    location /cable {
        proxy_pass http://iicom/cable;
        proxy_http_version 1.1;
        proxy_set_header Upgrade websocket;
        proxy_set_header Connection Upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto "https";
    }
}