user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;
events {
	worker_connections 768;
	# multi_accept on;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
  tcp_nodelay         on;
  keepalive_timeout   65;
	types_hash_max_size 2048;
	# server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	##
	# SSL Settings
	##

	# ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3; # Dropping SSLv3, ref: POODLE
	# ssl_prefer_server_ciphers on;

	##
	# Logging Settings
	##
    upstream unicorn {
      server unix:/var/www/iicom-sub/tmp/sockets/.unicorn.sock;
    }

    server {
      listen 443 ssl;
      server_name 153.127.58.234 ;

      client_max_body_size 100M;
      root /var/www/iicom-sub/public;

      error_page 404  /404.html;
      error_page 500 502 503 504  /500.html;
      try_files   $uri/index.html $uri @unicorn;
      add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';

      ssl_certificate "/home/ubuntu/.ssh/certificate.crt";
      ssl_certificate_key "/home/ubuntu/.ssh/iicom_sub_2023_2.key";

      ssl_protocols TLSv1.2;
      ssl_prefer_server_ciphers on;
      ssl_ciphers HIGH:!aNULL:!MD5;

      include /etc/nginx/default.d/*.conf;

      location @unicorn {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_pass http://unicorn;
      }
      # location / {

      #   proxy_pass http://153.127.58.234;
      #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      #   proxy_set_header Host $http_host;
      #   proxy_set_header X-Forwarded-Proto "https";
      #   proxy_redirect off;
      # } 
    }

    server {
      listen       80;
      listen       [::]:80;
      server_name  _;
      root         /usr/share/nginx/html;

      add_header Strict-Transport-Security 'max-age=31536000; includeSubDomains; preload';

#        ssl_protocols TLSv1.2 TLSv1.3;
#        ssl_prefer_server_ciphers on;
#        ssl_ciphers HIGH:!aNULL:!MD5;

        # Load configuration files for the default server block.
      include /etc/nginx/default.d/*.conf;

      error_page 404 /404.html;
        location = /404.html {
        }

      error_page 500 502 503 504 /50x.html;
        location = /50x.html {
        }
    }

    server {
      listen 80;
      server_name _;
      client_max_body_size 100M;
      return 301 https://$host$request_uri;
    }

    server {
      listen 443 ssl;
      listen [::]:443 ssl http2 default_server;
      server_name  _;

      client_max_body_size 100M;
      root /var/www/iicom-sub/public;
  
      ssl_protocols TLSv1 TLSv1.1 TLSv1.2;

      ssl_certificate "/home/ubuntu/.ssh/certificate.crt";
      ssl_certificate_key "/home/ubuntu/.ssh/iicom_sub_2023_2.key";

      ssl_session_cache shared:SSL:1m;
      ssl_session_timeout  10m;
      ssl_ciphers HIGH:!aNULL:!MD5;
      ssl_prefer_server_ciphers on;

      include /etc/nginx/default.d/*.conf;

    }

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}