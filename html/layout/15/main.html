  <main class="with-navigation with-sub-navigation">
    <section class="content">
      <h1>Hello</h1>
      <div class="card dropdown-list p-md mt-md">
        <div class="d-flex justify-content-space-between">
          <div class="icon"></div>
          <div class="drop-down-wrapper">
            <button class="dropdown">
              <span class="mx-xs fw-bold toggle">タイトル</span>

      <div class="card form parts p-md mt-md">
        <div class="d-flex justify-content-center">

            <div class="input-group">
              <label for="name">
                <p>部門</p>
                <p class="fs-xs fw-bold text-error">【必須】</p>
              </label>
              <input type="text" id="name" class="input-default">
            </div>
            <div class="input-group mt-md">
              <label for="email">
                <p>部門</p>
                <p class="fs-xs fw-bold text-error">【必須】</p>
              </label>
              <input type="email" id="email" class="input-light">
            </div>
            <div class="input-group mt-md">
              <label for="number">
                <p>部門</p>
                <p class="fs-xs fw-bold text-error">【必須】</p>
              </label>
              <input type="number" id="number" class="invalid">
            </div>
            <div class="input-group mt-md">
              <label for="password">
                <p>部門</p>
                <p class="fs-xs fw-bold text-error">【必須】</p>
              </label>
              <input type="password" id="password" class="input-default">
            </div>
            <div class="input-group mt-md">
              <label for="date">
                <p>部門</p>
                <p class="fs-xs fw-bold text-error">【必須】</p>
              </label>
              <input type="date" id="date" class="input-default">
            </div>
            <div class="input-group mt-md">
              <label for="datetime">
                <p>部門</p>
                <p class="fs-xs fw-bold text-error">【必須】</p>
              </label>
              <input type="datetime-local" id="datetime" class="input-default">
            </div>
            <div class="input-group mt-md">
              <label for="color">
                <p>部門</p>
                <p class="fs-xs fw-bold text-error">【必須】</p>
              </label>
              <input type="color" id="color" class="input-default">
            </div>    
            <div class="default-btn-wrapper mt-md">
              <button type="submit" class="btn-secondary btn-md">
                送信
              </button>
          </form>
        </div>
      </div>
    </section>
  </main>

<script>
  let showMenu = false
    window.addEventListener("click", () => { 
      const dropdownItem = document.querySelector(".dropdown-item")
      if (dropdownItem.classList.contains("visible")) dropdownItem.classList.remove("visible")
    })
  const dropdownButton = document.querySelector(".drop-down-wrapper .dropdown")
  dropdownButton.addEventListener("click", () => {
    event.stopPropagation()
    const dropdownItem = document.querySelector(".dropdown-item")
    if (dropdownItem.classList.contains("visible")) {
      dropdownItem.classList.remove("visible")
    } else {
      dropdownItem.classList.add("visible")
    }
  })

  let result = []
  const form = document.querySelector(".form form")
  form.addEventListener("submit", () => {
    // alert("hello")
    const nameInputElement = document.querySelector('input[name="name"]')
    const emailInputElement = document.querySelector('input[name="email"]')
    const dateInputElement = document.querySelector('input[name="date"]')
    const numberInputElement = document.querySelector('input[name="number"]')
    result.push({ nameInputElement }, { emailInputElement }, { dateInputElement }, { numberInputElement })
    console.log(result)
  })
</script>
