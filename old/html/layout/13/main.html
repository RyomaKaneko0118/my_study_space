<script>
  const spanElement = document.getElementById('span-item-1')
  if (spanElement) {
    const text = "happy".repeat(10)
    spanElement.textContent = text
  }

  const specificNavLiElement = document.getElementById('item-1')
  const isActive = true
  if (isActive) {
    specificNavLiElement.classList.add("active")
  } else {
    specificNavLiElement.classList.remove("active")
  }

  const specificSubNavLiElement = document.getElementById('sub-item-1')
  if (isActive) {
    specificSubNavLiElement.classList.add("active")
  } else {
    specificSubNavLiElement.classList.remove("active")
  }

  const frutsCheckBoxElements = document.querySelectorAll('.checkbox-wrapper')
  console.log("check")
  for (const frutsCheckBoxElement of frutsCheckBoxElements) {
    frutsCheckBoxElement.addEventListener("click", () => {
      const input = frutsCheckBoxElement.querySelector("input")
      if (input.checked === true) {
        input.checked = false
      } else {
        input.checked = true
      }
    })
  }
  const submitFrutsButton = document.getElementById('submitFruts')
  submitFrutsButton.addEventListener("click", () => {
    const frutsCheckBoxElements = document.querySelectorAll('input[name="secondary-fruts"]')
    const result = []
    for (const frutsCheckBoxElement of frutsCheckBoxElements) {
      if (frutsCheckBoxElement.checked) {
        result.push(frutsCheckBoxElement.value)
      }
    }
    console.log(result)
  })
</script>
