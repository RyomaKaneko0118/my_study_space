<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ベースのhtml</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="assets/application.css">
</head>

<body>

	<div class="container is-xl">
		<div class="a-switch is-hidden-sm-down">
			<label class="a-switch__label" for="modal-mentor-mode">
				<span class="a-switch__label-text">メンターモード</span>
				<div class="a-help">
					<i class="fa-solid fa-question"></i>
				</div>
			</label>
		</div>
		<input type="checkbox" id="modal-mentor-mode" class="a-toggle-checkbox">

		<div class="modal">
			<label class="modal__overlay" for="modal-mentor-mode"></label>
			<div class="modal__content">
				<div class="modal__header">
					<h2 class="modal__title">メンターモードとは？</h2>
					<label class="modal-header__close" for="modal-mentor-mode"></label>
				</div>
				<div class="modal__body">
					<div class="modal__description is-md">
						<div class="a-short-text">
							<p>
								メンターモードをONにしたときだけ、メンターにしか見えない情報が表示されます。
								画面共有をする際などは、見えてはいけない情報が表示されるのを防ぐため、メンターモードをOFFにするようお願いします🙏
							</p>
						</div>
					</div>
				</div>
		</div>
	</div>
</body>
</html>
