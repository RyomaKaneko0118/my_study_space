<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="d-flex flex-direction-column align-items-center">
    <div class="header color-white d-flex align-items-center px-md">
      <p class="c-badge primary">test</p>
    </div>
    <div class="area color-gray p-md d-flex justify-content-space-between">
      <div class="square color-primary"></div>
      <div class="square color-secondary"></div>
      <div class="square color-tertiary"></div>
    </div>
    <div class="area color-gray p-md d-flex justify-content-center mt-xs">
      <div class="square color-primary"></div>
      <div class="square color-secondary"></div>
      <div class="square color-tertiary"></div>
    </div>
    <div class="square color-primary"></div>
    <div class="square color-secondary"></div>
    <div class="square color-tertiary"></div>
    <div class="specific-area d-flex justify-content-center">
      <div class="wrapper color-link d-flex justify-content-center p-md">
        <div class="square color-primary"></div>
        <div class="square color-secondary"></div>
        <div class="square color-tertiary"></div>      
      </div>
    </div>
    <div class="specific-area d-flex justify-content-center mt-md">
      <div class="wrapper color-link d-flex justify-content-center p-md">
        <div class="square-2 color-primary"></div>
        <div class="square-3 color-secondary"></div>
      </div>
    </div>
    <div class="specific-area d-flex justify-content-center mt-md">
      <div class="wrapper color-link d-flex justify-content-center p-md">
        <div class="square-2 color-primary"></div>
        <div class="square-3 color-secondary">
          <div class="square-4 color-warning"></div>
          <div class="square-4 color-error"></div>
        </div>
      </div>
    </div>
    <div class="specific-area d-flex justify-content-center mt-md">
      <div class="wrapper color-link d-flex justify-content-center p-md">
        <div class="square-2 color-primary"></div>
        <div class="square-3 color-secondary d-flex flex-direction-column">
          <div class="square-4 color-warning"></div>
          <div class="square-4 color-error"></div>
        </div>
      </div>
    </div>
    <div class="specific-area d-flex justify-content-center mt-md">
      <div class="wrapper color-link d-flex justify-content-center p-md">
        <div class="square-2 color-primary"></div>
        <div class="square-3 color-secondary d-flex flex-direction-column">
          <div class="square-4 color-warning"></div>
          <div class="square-4 color-error d-flex justify-content-start p-md">
            <div class="square-4 color-primary mr-md"></div>
            <div class="square-4 color-secondary"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="specific-area d-flex justify-content-center mt-md">
      <div class="wrapper color-link d-flex justify-content-center p-md">
        <div class="square-5 color-secondary">
          <span class="border d-inline-block mt-md"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
