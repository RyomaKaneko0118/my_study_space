<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Simple Stream Pump</title>
</head>
<body>
<h1>Simple Stream Pump</h1>
<p>The left tortoise is the original, the right one is created using a custom stream.</p>
<img src="tortoise.png" 
     width="150" 
     height="84" 
     alt="Tortoise Original">
<img src="." 
     width="150" 
     height="84" 
     alt="Tortoise Copy" 
     id="target">
<script>
  const image = document.getElementById('target')


  fetch('./tortoise.png')
  // Retrieve its body as ReadableStream
  // bodyからReadableStreamとして取り出す
  .then(response => {
    return response.body
  })
  .then(rs => {
    console.log("response.body")
    console.log(rs)

    const reader = rs.getReader()

    console.log("getReader")
    console.log(reader)

    return new ReadableStream({
      async start(controller) {
        while (true) {
          const { done, value } = await reader.read()

          // When no more data needs to be consumed, break the reading
          // データを消費する必要がなくなったら、読み取りを中断する
          if (done) {
            break
          }

          // Enqueue the next data chunk into our target stream
          // 次のデータチャンクをターゲットストリームにエンキューする
          controller.enqueue(value);
        }

        // Close the stream
        controller.close();
        reader.releaseLock();
      }
    })
  })
  // Create a new response out of the stream
  .then(rs => {
    console.log("ReadableStream")
    console.log(rs)
    return new Response(rs)
  })
  // Create an object URL for the response
  .then(response => {
    console.log("new Response")
    console.log(response)

    return response.blob()
  })
  .then(blob => {
    console.log("response.blob")
    console.log(blob)
    return URL.createObjectURL(blob)
  })
  // Update image
  .then(url => {
    console.log("URL.createObjectURL")
    console.log(url)
    return image.src = url 
  })
  .catch(console.error);

</script>
</body>
</html>
