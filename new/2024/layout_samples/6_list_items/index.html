<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ベースのhtml</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="assets/application.css">
<script src="https://kit.fontawesome.com/3dfd965499.js" crossorigin="anonymous"></script>
</head>

<body class="is-application">
	<div class="wrapper is-application">
		<main class="page">
			<div class="container is-md">
				<div class="page-content reports">
					<div class="card-list a-card">
						<div class="card-list__items">
							<div class="card-list-item">
								<div class="card-list-item__inner">
									<div class="card-list-item__user">
										<a href="" class="card-list-item__user-link">
											<span class="a-user-role is-admin">
												<img src="assets/images/logo-lg.svg"
												     class="card-list-item__user-icon a-user-icon"
												     title="komagata"
												     alt="komagata">
											</span>	
										</a>
									</div>
									<div class="card-list-item__rows">
										<div class="card-list-item__row">
											<header class="card-list-item-title">
												<div class="card-list-item-title__start">
													<h2 class="card-list-item-title__title">
														<a class="card-list-item-title__link a-text-link js-unconfirmed-link">
															<img src="assets/images/sad.svg" alt="sad" class="card-list-item-title__emotion-image">
															学習3日目
														</a>
													</h2>
												</div>
											</header>
										</div>	
										<div class="card-list-item__row">
											<div class="card-list-item-meta">
												<div class="card-list-item-meta__items">
													<div class="card-list-item-meta__item">
														<a href=""
														   class="a-user-name">
															komagata
														</a>
													</div>
													<div class="card-list-item-meta__item">
														<time class="a-meta">
															2023年2月1日の日報
														</time>
													</div>
												</div>
											</div>
											<hr class="card-list__row-separator">
											<div class="card-list-item__row">
												<div class="card-list-item-meta">
												  <div class="card-list-item-meta__items">
														<div class="card-list-item-meta__item">
															<div class="a-meta">
															  コメント(2)	
															</div>
														</div>
														<div class="card-list-item-meta__item">
															<div class="card-list-item__user-icons">
																<a class="card-list-item__user-icons-icon">
																	<img src="assets/images/logo-lg.svg"
																	     class="a-user-icon"
																	     title="komagata"
																	     alt="komagata">
																</a>
																<a class="card-list-item__user-icons-icon"
																   href="">
																	 <img src="assets/images/logo-lg.svg"
																	      class="a-user-icon"
																	      title="komagata"
																	      alt="komagata">
																</a>
															</div>
														</div>
														<div class="card-list-item-meta__item">
															<time datetime="2024-05-06"
															      pubdate="pubdate"
																		class="a-meta">
																~ 05月06日20:36
															</time>
														</div>
													</div>	
												</div>	
											</div>	
										</div>	
									</div>
									<div class="stamp stamp-approve">
										<h2 class="stamp__content is-title">
											確認済み
										</h2>
										<time class="stamp__content is-created-at">
											2024/07/25
										</time>
										<div class="stamp__content is-user-name">
										  <div class="stamp__content-inner">
												machidamachidamachidamachidamachidamachidamachidamachidamachidamachida
											</div>	
										</div>
									</div>	
								</div>
							</div>
							<div class="card-list-item">
								card-list__item
							</div>
							<div class="card-list-item">
								card-list__item
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</body>
</html>
