<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ベースのhtml</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="assets/application.css">
<script src="https://kit.fontawesome.com/3dfd965499.js" crossorigin="anonymous"></script>
</head>

<body class="is-application">
	<div class="wrapper is-application">
		<main class="page">
			<section id="carousel">
				<div class="description">
					<p>z-indexを同じにして、要素の最後を一番上にする</p>
					<p>写真だけでなく左右のナビゲーションも重ね合わせている</p>
				</div>
				<div class="carousel">
					<input type="radio" id="carousel-1" name="carousel[]" checked>
					<input type="radio" id="carousel-2" name="carousel[]">
					<input type="radio" id="carousel-3" name="carousel[]">
					<input type="radio" id="carousel-4" name="carousel[]">
					<input type="radio" id="carousel-5" name="carousel[]">
					<ul class="carousel__items">
						<li class="carousel__item">
							<img src="assets/images/carousel-1.JPG" alt="">
						</li>
						<li class="carousel__item">
							<img src="assets/images/carousel-2.JPG" alt="">
						</li>
						<li class="carousel__item">
							<img src="assets/images/carousel-3.JPG" alt="">
						</li>
						<li class="carousel__item">
							<img src="assets/images/carousel-4.JPG" alt="">
						</li>
						<li class="carousel__item">
							<img src="assets/images/carousel-5.JPG" alt="">
						</li>
					</ul>
					<div class="carousel__prev">
						<label for="carousel-1"></label>
						<label for="carousel-2"></label>
						<label for="carousel-3"></label>
						<label for="carousel-4"></label>
						<label for="carousel-5"></label>
					</div>
					<div class="carousel__next">
						<label for="carousel-1"></label>
						<label for="carousel-2"></label>
						<label for="carousel-3"></label>
						<label for="carousel-4"></label>
						<label for="carousel-5"></label>
					</div>
					<div class="carousel__nav">
						<label for="carousel-1"></label>
						<label for="carousel-2"></label>
						<label for="carousel-3"></label>
						<label for="carousel-4"></label>
						<label for="carousel-5"></label>
					</div>
				</div>
			</section>
		</main>
	</div>
</body>
</html>
